<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="sig" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Outer arc -->
  <path d="M 22 58 A 30 30 0 0 1 78 58" stroke="url(#sig)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Mid arc -->
  <path d="M 30 63 A 20 20 0 0 1 70 63" stroke="url(#sig)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- Inner arc -->
  <path d="M 38 68 A 12 12 0 0 1 62 68" stroke="url(#sig)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- Center dot -->
  <circle cx="50" cy="68" r="5" fill="url(#sig)"/>
  <!-- Pulse line up -->
  <path d="M 50 63 L 50 52" stroke="url(#sig)" stroke-width="4" stroke-linecap="round"/>
  <!-- Pulse waveform above -->
  <path d="M 32 44 L 38 44 L 41 36 L 44 52 L 47 40 L 50 48 L 53 44 L 68 44" stroke="url(#sig)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
